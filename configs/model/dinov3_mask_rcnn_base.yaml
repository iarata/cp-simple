# Same wrapper as dinov3_mask_rcnn but with the ViT-B/16 DINOv3 backbone for a
# stronger (about +3-5 mAP) but ~3x slower configuration. Drop-in: every other knob
# matches the small variant so the augmentation-study comparison stays fair.
name: dinov3_mask_rcnn_base
family: dinov3_maskrcnn
backbone_name: vit_base_patch16_dinov3
backbone_pretrained: true
backbone_freeze: false
# ViT-B (86M) is heavy enough at batch=128 that grad checkpointing pays off.
# Override to false if you're running smaller batches.
backbone_grad_checkpointing: true
backbone_drop_path_rate: 0.15
compile_backbone: true
compile_mode: default
image_size: 512
fpn_out_channels: 256
image_mean: [0.485, 0.456, 0.406]
image_std: [0.229, 0.224, 0.225]
box_detections_per_image: 100
box_score_thresh: 0.0
box_nms_thresh: 0.5
box_batch_size_per_image: 128
box_positive_fraction: 0.25
rpn_batch_size_per_image: 128
rpn_positive_fraction: 0.5
rpn_pre_nms_top_n_train: 1000
rpn_pre_nms_top_n_test: 1000
rpn_post_nms_top_n_train: 1000
rpn_post_nms_top_n_test: 1000
anchor_sizes: [[32], [64], [128], [256], [512]]
anchor_aspect_ratios: [0.5, 1.0, 2.0]
# ViT-B/16 has 12 blocks too, so the same indices work.
attention_block_indices: [0, 5, 11]
attention_layer_names: ["first", "middle", "last"]
mask_head_channels: 128
mask_head_num_convs: 4
loss_weights: {}
