# @package _global_

defaults:
  - /train_config
  - override /model: maskrcnn_swin_t
  - override /train: maskrcnn
  - override /augmentation: normal
  - _self_

subset:
  percent: 25
  seed: 1337
  premade:
    train_variant: underrepresented_q025/none

augmentation:
  use_albumentations: true
  horizontal_flip_p: 0.5
  brightness_limit: 0.2
  contrast_limit: 0.2

train:
  run_name: premade_maskrcnn_none_online_normal_pct_025_seed_1337

eval:
  mode: full
  visualize_batches: 2

wandb:
  group: premade_maskrcnn_pct_025_seed_1337
  tags: [premade, maskrcnn, none, online-normal, pct-025]
